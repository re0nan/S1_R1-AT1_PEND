<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rápido & Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-white">

    <header class="text-center py-3 shadow-sm bg-white text-dark">
        <img src="./image (1).png" alt="Logo Rápido & Seguro" width="200" class="mb-2">
        <h1 class="h4 m-0">Rápido & Seguro</h1>
    </header>

    <main class="d-flex flex-grow-1 align-items-center justify-content-center">
        <div class="card p-4 shadow text-center border-0 rounded-4" style="width:100%; max-width:400px;">
            
            <h2 class="h5 mb-3">Acesso</h2>

            <form>
                <input type="email" class="form-control mb-3" placeholder="E-mail" required>
                <input type="password" class="form-control mb-3" placeholder="Senha" required>
                
                <button type="submit" 
                        class="btn w-100 mb-2 text-white fw-medium" 
                        style="background-color: #0c9b58; transition: 0.3s;"
                        onMouseOver="this.style.backgroundColor='#157347'; this.style.transform='scale(1.03)';"
                        onMouseOut="this.style.backgroundColor='#0c9b58'; this.style.transform='scale(1)';"
                >
                    Entrar
                </button>

                <div class="text-center">
                    <a href="#" class="small text-decoration-none text-success">Esqueci minha senha</a>
                </div>
            </form>

        </div>
    </main>

    <footer class="text-center py-2 shadow-sm bg-dark text-white">
        <small>© 2026 Todos os direitos reservados para a Rápido & Seguro</small>
    </footer>

</body>
</html>
